<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم نظام الملز</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .container { margin-top: 50px; background: white; padding: 40px; display: inline-block; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        h1 { color: #2c3e50; }
        .btn { background-color: #3498db; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; margin: 10px; display: inline-block; cursor: pointer; border: none; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background-color: #2980b9; }
        .btn-delete { background-color: #e74c3c; }
        .btn-delete:hover { background-color: #c0392b; }
        input { padding: 12px; width: 90%; border-radius: 8px; border: 1px solid #ddd; margin: 20px 0; text-align: center; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 نظام تشغيل الملز (الرواتب)</h1>
        <hr>
        <!-- مربع البحث فوق الأزرار مباشرة -->
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن اسم موظف...">
        <br>
        <a href="/list" class="btn">عرض قائمة الموظفين 📋</a>
        <button class="btn btn-delete" onclick="askPassword()">مسح البيانات 🔐</button>
    </div>

    <script>
        function askPassword() {
            let pass = prompt("الرجاء إدخال كلمة السر للمسح:");
            if (pass != null && pass != "") {
                window.location.href = "/clear/" + pass;
            }
        }
    </script>
</body>
</html>
