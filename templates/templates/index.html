<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم نظام الملز</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; }
        .container { margin-top: 50px; background: white; padding: 40px; display: inline-block; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .btn { background-color: #3498db; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; margin: 10px; display: inline-block; cursor: pointer; border: none; font-size: 16px; font-weight: bold; }
        .btn-delete { background-color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 نظام تشغيل الملز (الرواتب)</h1>
        <hr>
        <a href="/list" class="btn">عرض قائمة الموظفين 📋</a>
        <button class="btn btn-delete" onclick="askPassword()">مسح البيانات 🔐</button>
    </div>
    <script>
        function askPassword() {
            let pass = prompt("الرجاء إدخال كلمة السر للمسح:");
            if (pass != null && pass != "") {
                window.location.href = "/clear/" + pass;
            }
        }
    </script>
</body>
</html>
